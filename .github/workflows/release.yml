name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run icons
      - run: npm run build
      - name: Create dist zip
        run: |
          cd dist
          zip -r ../poe2-pob-copy-button-dist.zip .
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: poe2-pob-copy-button-dist.zip
