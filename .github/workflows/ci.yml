name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run format:check
      - run: npm run icons
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: poe2-pob-copy-button-dist
          path: dist/
